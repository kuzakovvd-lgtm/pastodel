server {
    listen 80;
    listen [::]:80;
    server_name pastodel.ru www.pastodel.ru 85.239.63.149;

    root /var/www/pastodel;
    index index.html;

    access_log /var/log/nginx/pastodel.access.log;
    error_log /var/log/nginx/pastodel.error.log warn;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location = /favicon.svg {
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    location ~* \.(css|js|mjs|json|svg|ico|jpg|jpeg|png|gif|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
